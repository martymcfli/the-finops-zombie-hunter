<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Dark space background -->
  <circle cx="32" cy="32" r="32" fill="#1a1f3a"/>

  <!-- Stars -->
  <rect x="10" y="8"  width="2" height="2" fill="#ffffff" opacity="0.8"/>
  <rect x="50" y="12" width="2" height="2" fill="#ffffff" opacity="0.6"/>
  <rect x="54" y="22" width="1" height="1" fill="#ffffff" opacity="0.5"/>
  <rect x="8"  y="20" width="1" height="1" fill="#ffffff" opacity="0.5"/>

  <!-- Gold outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#f5a623" stroke-width="3"/>

  <!-- Cloud body (white/light grey pixel art) -->
  <rect x="14" y="28" width="36" height="18" fill="#c8d4e0" rx="2"/>
  <rect x="18" y="24" width="10" height="6"  fill="#c8d4e0"/>
  <rect x="36" y="24" width="10" height="6"  fill="#c8d4e0"/>
  <rect x="26" y="22" width="12" height="8"  fill="#d8e4f0"/>
  <!-- cloud shadow pixels -->
  <rect x="14" y="42" width="36" height="4"  fill="#a8b8c8"/>

  <!-- Lightning left -->
  <rect x="14" y="34" width="3" height="2" fill="#f5a623"/>
  <rect x="12" y="36" width="3" height="2" fill="#f5a623"/>
  <!-- Lightning right -->
  <rect x="47" y="34" width="3" height="2" fill="#f5a623"/>
  <rect x="49" y="36" width="3" height="2" fill="#f5a623"/>

  <!-- Zombie face - green skin background -->
  <rect x="24" y="18" width="16" height="18" fill="#4a7c4e"/>
  <!-- Face shading/darker patches -->
  <rect x="24" y="18" width="4"  height="4"  fill="#3a6040"/>
  <rect x="36" y="18" width="4"  height="4"  fill="#3a6040"/>
  <rect x="24" y="28" width="4"  height="4"  fill="#3a6040"/>
  <rect x="36" y="30" width="4"  height="6"  fill="#3a6040"/>

  <!-- Left eye (yellow/dead) -->
  <rect x="26" y="23" width="4" height="4" fill="#d4b800"/>
  <rect x="27" y="24" width="2" height="2" fill="#8a7500"/>
  <!-- Right eye (red laser) -->
  <rect x="34" y="23" width="4" height="4" fill="#cc2200"/>
  <rect x="35" y="24" width="2" height="2" fill="#ff4400"/>
  <!-- Laser beam from right eye -->
  <rect x="38" y="24" width="6" height="2" fill="#ff3300" opacity="0.9"/>
  <rect x="44" y="24" width="4" height="1" fill="#ff3300" opacity="0.5"/>

  <!-- Crosshair on forehead -->
  <rect x="29" y="19" width="6" height="1" fill="#cc0000"/>
  <rect x="31" y="17" width="2" height="5" fill="#cc0000"/>
  <rect x="31" y="19" width="2" height="2" fill="#ff2200"/>

  <!-- Mouth (jagged teeth) -->
  <rect x="26" y="32" width="12" height="4" fill="#2a1a0a"/>
  <rect x="26" y="32" width="2" height="2" fill="#e8e0d0"/>
  <rect x="30" y="32" width="2" height="3" fill="#e8e0d0"/>
  <rect x="34" y="32" width="2" height="2" fill="#e8e0d0"/>
  <rect x="28" y="33" width="2" height="2" fill="#e8e0d0"/>
  <rect x="32" y="32" width="2" height="2" fill="#e8e0d0"/>

  <!-- Headphone left -->
  <rect x="22" y="22" width="3" height="6" fill="#555566" rx="1"/>
  <!-- Headphone right -->
  <rect x="39" y="22" width="3" height="6" fill="#555566" rx="1"/>

  <!-- Radar screen (center bottom) -->
  <rect x="26" y="44" width="12" height="10" fill="#1a2a1a" rx="1"/>
  <rect x="27" y="45" width="10" height="8"  fill="#0a1a0a"/>
  <!-- Radar sweep -->
  <rect x="30" y="48" width="4" height="1" fill="#00cc44" opacity="0.8"/>
  <rect x="31" y="46" width="1" height="4" fill="#00cc44" opacity="0.8"/>
  <circle cx="32" cy="49" r="3" fill="none" stroke="#00aa33" stroke-width="0.5" opacity="0.6"/>
  <!-- Radar blip -->
  <rect x="33" y="47" width="1" height="1" fill="#00ff55"/>

  <!-- Left arm/hand holding flashlight -->
  <rect x="10" y="36" width="8" height="6" fill="#4a7c4e"/>
  <rect x="8"  y="37" width="6" height="4" fill="#555566"/>
  <!-- Flashlight beam -->
  <rect x="4"  y="37" width="5" height="2" fill="#fff8c0" opacity="0.7"/>
  <rect x="2"  y="36" width="3" height="4" fill="#fff8c0" opacity="0.4"/>

  <!-- Right arm/satellite dish area -->
  <rect x="46" y="36" width="8" height="6" fill="#4a7c4e"/>
  <rect x="48" y="35" width="6" height="5" fill="#555566"/>
  <!-- Dish antenna lines -->
  <rect x="50" y="33" width="1" height="3" fill="#888899"/>
  <rect x="48" y="32" width="5" height="1" fill="#888899"/>

  <!-- Bottom lightning bolts -->
  <rect x="27" y="54" width="2" height="4" fill="#f5a623"/>
  <rect x="25" y="56" width="2" height="4" fill="#f5a623"/>
  <rect x="35" y="54" width="2" height="4" fill="#f5a623"/>
  <rect x="37" y="56" width="2" height="4" fill="#f5a623"/>

  <!-- Clip everything to the circle -->
  <circle cx="32" cy="32" r="32" fill="none"/>
</svg>
